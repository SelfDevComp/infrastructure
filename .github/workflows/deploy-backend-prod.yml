name: Deploy Backend Prod

on:
  repository_dispatch:
    types:
      - backend-deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/apps/infrastructure
            git pull --ff-only
            export BACKEND_IMAGE="${{ github.event.client_payload.image }}"
            docker pull "$BACKEND_IMAGE"
            docker compose -f docker-compose.prod.backend.yaml up -d
            docker image prune -f