name: Deploy Frontend Prod

on:
  repository_dispatch:
    types:
      - frontend-deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/apps/infrastructure
            git pull --ff-only
            export FRONTEND_IMAGE="${{ github.event.client_payload.image }}"
            docker compose -f docker-compose.prod.frontend.yaml pull frontend
            docker compose -f docker-compose.prod.frontend.yaml up -d --force-recreate frontend
            sleep 10
            curl -I --fail https://self-dev.tech
            docker image prune -f