name: Deploy Stage

on:
  repository_dispatch:
    types:
      - deploy-stage


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy stage
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/apps/infrastructure
            git pull --ff-only
            export FRONTEND_IMAGE=${{ github.event.client_payload.image }}
            docker compose -f docker-compose.stage.yaml up -d --remove-orphans
            sleep 20
            curl --fail https://stage.self-dev.tech
            docker image prune -f