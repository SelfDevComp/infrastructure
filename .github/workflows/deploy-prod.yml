name: Deploy Prod

on:
  repository_dispatch:
    types:
      - deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/apps/infrastructure
            git pull --ff-only
            export FRONTEND_IMAGE="${{ github.event.client_payload.image }}"
            docker pull "$FRONTEND_IMAGE"
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans
            sleep 20
            curl --fail https://self-dev.tech
            docker image prune -f